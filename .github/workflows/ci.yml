name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts:
    name: TypeScript (lint, build, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vektor
          POSTGRES_PASSWORD: vektor
          POSTGRES_DB: vektor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vektor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      PORT: 8080
      HOSTING_URL: localhost
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: vektor
      DATABASE_USER: vektor
      DATABASE_PASSWORD: vektor
      DATABASE_SSL_OPTION: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun turbo lint

      - name: Build
        run: bun turbo build

      - name: Push DB schema
        run: |
          PGPASSWORD=vektor psql -h localhost -U vektor -d vektor -c 'CREATE SCHEMA IF NOT EXISTS "mainSchema";'
          cd apps/api && bunx drizzle-kit generate --config=db/config/drizzle.config.ts && bunx drizzle-kit migrate --config=db/config/drizzle.config.ts

      - name: Test
        run: bun turbo test

  php:
    name: PHP (lint, analyse, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, mbstring, sqlite3
          tools: composer:v2
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/server/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Lint
        run: composer lint

      - name: Warm Symfony cache
        run: php bin/console cache:warmup --env=dev --no-optional-warmers
        env:
          DATABASE_URL: mysql://dummy:dummy@localhost:3306/dummy?serverVersion=8.0

      - name: Static Analysis
        run: composer analyse

      - name: Clear cache before tests
        run: rm -rf var/cache

      - name: Test
        run: composer test
