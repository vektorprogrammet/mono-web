[build]
buildCommand = "pnpm install && pnpm run build"
watchPatterns = ["apps/homepage/**", "packages/**", "package.json", "bun.lock"]

[deploy]
startCommand = "/bin/sh -c 'serve build/client -s -l $PORT'"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
