liip_imagine:
    resolvers:
        default:
            web_path:
                web_root: '%kernel.project_dir%/public'

    loaders:
        default:
            filesystem:
                data_root: '%kernel.project_dir%/public'

    cache: ~

    filter_sets:
        article_crop:
            quality: 100
            filters:
                relative_resize: { scale: 2.5 }
                crop: { start: [10, 20], size: [120, 90] }
        max_500px:
            quality: 85
            filters:
                downscale:
                    max: [500, 500]
        article_large:
            quality: 85
            filters:
                downscale:
                    max: [900, 900]
        article_small:
            quality: 85
            filters:
                downscale:
                    max: [500, 500]
        profile_img:
            quality: 85
            filters:
                downscale:
                    max: [400, 400]
        profile_img_small:
            quality: 85
            filters:
                downscale:
                    max: [200, 200]
        profile_img_tiny:
            quality: 85
            filters:
                downscale:
                    max: [40, 40]
