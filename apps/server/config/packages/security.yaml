security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
            algorithm: bcrypt
            cost: 12

    role_hierarchy:
        ROLE_TEAM_MEMBER: ROLE_USER
        ROLE_TEAM_LEADER: [ROLE_USER, ROLE_TEAM_MEMBER, ROLE_ALLOWED_TO_SWITCH]
        ROLE_ADMIN: [ROLE_USER, ROLE_TEAM_MEMBER, ROLE_TEAM_LEADER, ROLE_ALLOWED_TO_SWITCH]

    providers:
        chain_provider:
            chain:
                providers: [db_username, db_email, db_company_email]
        db_username:
            entity:
                class: App\Identity\Infrastructure\Entity\User
                property: user_name
        db_email:
            entity:
                class: App\Identity\Infrastructure\Entity\User
                property: email
        db_company_email:
            entity:
                class: App\Identity\Infrastructure\Entity\User
                property: companyEmail

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
            provider: chain_provider
        api_login:
            pattern: ^/api/login
            stateless: true
            provider: chain_provider
            user_checker: App\Identity\Infrastructure\UserChecker
            json_login:
                check_path: /api/login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
        api:
            pattern: ^/api
            stateless: true
            provider: chain_provider
            user_checker: App\Identity\Infrastructure\UserChecker
            jwt: ~
        admin_area:
            pattern: ^/admin
            http_basic: ~
            provider: chain_provider
            user_checker: App\Identity\Infrastructure\UserChecker
        secured_area:
            lazy: true
            http_basic: ~
            provider: chain_provider
            user_checker: App\Identity\Infrastructure\UserChecker
            entry_point: form_login
            form_login:
                login_path: /login
                check_path: /login_check
                always_use_default_target_path: false
                default_target_path: /login/redirect
                require_previous_session: false
            remember_me:
                secret: '%env(APP_SECRET)%'
                name: '%remember_me.name%'
                lifetime: 31536000
                path: /
            logout:
                path: /logout
                target: /
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    access_control:
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/sponsors, roles: PUBLIC_ACCESS }
        - { path: ^/api/articles, roles: PUBLIC_ACCESS }
        - { path: ^/api/static_contents, roles: PUBLIC_ACCESS }
        - { path: ^/api/change_log_items, roles: PUBLIC_ACCESS }
        - { path: ^/api/departments, roles: PUBLIC_ACCESS }
        - { path: ^/api/admission_periods, roles: PUBLIC_ACCESS }
        - { path: ^/api/info_meetings, roles: PUBLIC_ACCESS }
        - { path: ^/api/teams, roles: PUBLIC_ACCESS }
        - { path: ^/api/team_memberships, roles: PUBLIC_ACCESS }
        - { path: ^/api/field_of_studies, roles: PUBLIC_ACCESS }
        - { path: ^/api/statistics, roles: PUBLIC_ACCESS }
        - { path: ^/api/applications/existing, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/applications, roles: PUBLIC_ACCESS }
        - { path: ^/api/contact_messages, roles: PUBLIC_ACCESS }
        - { path: ^/api/admission_subscribers, roles: PUBLIC_ACCESS }
