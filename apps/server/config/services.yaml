parameters:
    locale: 'no'
    session.name: VPSESSID
    remember_me.name: VPREMEMBER

    google_api:
        client_id: '%env(GOOGLE_API_CLIENT_ID)%'
        client_secret: '%env(GOOGLE_API_CLIENT_SECRET)%'
        refresh_token: '%env(GOOGLE_API_REFRESH_TOKEN)%'
        disabled: true

    container.dumper.inline_class_loader: true

    slack.notification_channel: '#notifications'
    slack.log_channel: '%env(LOG_CHANNEL)%'
    slack.disable_delivery: '%env(bool:SLACK_DISABLED)%'

    gateway_sms:
        api_token: '%env(GATEWAY_API_TOKEN)%'
        disable_delivery: '%env(bool:SMS_DISABLE)%'
        max_length: 1200
        country_code: '47'

    admission_notifier_limit: 100

    public_uploads: "Offentlige filer"
    private_uploads: "../Private filer"
    profile_photos: 'images/Profile photos'
    logo_images: 'images/Logo images'
    signature_images: '../signatures'
    receipt_images: 'images/receipts'
    article_images: 'images/article_images'
    newsletter_images: 'images/newsletter_images'
    team_images: 'images/team_images'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: true
        bind:
            App\Support\Infrastructure\Mailer\MailerInterface: '@App\Support\Infrastructure\Mailer\Mailer'
            App\Support\Infrastructure\Sms\SmsSenderInterface: '@App\Support\Infrastructure\Sms\SmsSender'

    App\:
        resource: "../src/App/{Command,Controller,EventSubscriber,Form,Role,Security,Service,State,Twig,Validator}"

    # Bounded context autodiscovery
    App\Admission\:
        resource: '../src/App/Admission/'
        exclude: '../src/App/Admission/Domain/{ValueObjects,Events}/'

    App\Interview\:
        resource: '../src/App/Interview/'
        exclude: '../src/App/Interview/{Domain/{ValueObjects,Events},Infrastructure/Entity}/'

    App\Organization\:
        resource: '../src/App/Organization/'
        exclude: '../src/App/Organization/Domain/{ValueObjects,Events}/'

    App\Survey\:
        resource: '../src/App/Survey/'
        exclude: '../src/App/Survey/Domain/{ValueObjects,Events}/'

    App\Identity\:
        resource: '../src/App/Identity/'
        exclude:
            - '../src/App/Identity/Domain/{ValueObjects,Events}/'
            - '../src/App/Identity/Infrastructure/UserMap.php'

    App\Scheduling\:
        resource: '../src/App/Scheduling/'
        exclude: '../src/App/Scheduling/Domain/{ValueObjects,Events,Rules}/'

    App\Operations\:
        resource: '../src/App/Operations/'
        exclude: '../src/App/Operations/Domain/{ValueObjects,Events,Rules}/'

    App\Content\:
        resource: '../src/App/Content/'
        exclude: '../src/App/Content/Domain/{ValueObjects,Events}/'

    App\Shared\:
        resource: '../src/App/Shared/'

    App\Support\:
        resource: '../src/App/Support/'

    # Per-context subscriber blocks with scoped bindings
    App\Admission\Infrastructure\Subscriber\:
        resource: '../src/App/Admission/Infrastructure/Subscriber/'

    App\Interview\Infrastructure\Subscriber\:
        resource: '../src/App/Interview/Infrastructure/Subscriber/'
        bind:
            Psr\Log\LoggerInterface: '@App\Support\Infrastructure\LogService'

    App\Organization\Infrastructure\Subscriber\:
        resource: '../src/App/Organization/Infrastructure/Subscriber/'
        bind:
            App\Support\Infrastructure\Mailer\MailerInterface: '@App\Support\Infrastructure\Mailer\Mailer'
            Psr\Log\LoggerInterface: '@App\Support\Infrastructure\LogService'

    App\Content\Infrastructure\Subscriber\:
        resource: '../src/App/Content/Infrastructure/Subscriber/'
        bind:
            Psr\Log\LoggerInterface: '@App\Support\Infrastructure\LogService'

    App\Operations\Infrastructure\Subscriber\:
        resource: '../src/App/Operations/Infrastructure/Subscriber/'
        bind:
            Psr\Log\LoggerInterface: '@App\Support\Infrastructure\LogService'

    App\Identity\Infrastructure\Subscriber\:
        resource: '../src/App/Identity/Infrastructure/Subscriber/'
        bind:
            Psr\Log\LoggerInterface: '@App\Support\Infrastructure\LogService'

    # Support DataFixtures
    App\Support\DataFixtures\ORM\:
        resource: '../src/App/Support/DataFixtures/ORM'
        tags: ['doctrine.fixture.orm']

    App\Identity\Infrastructure\ReversedRoleHierarchy:
        arguments:
            $hierarchy: '%security.role_hierarchy.roles%'

    App\Admission\Infrastructure\AdmissionNotifier:
        arguments:
            $sendLimit: '%admission_notifier_limit%'

    App\Support\Infrastructure\Sms\SlackSms:
        autowire: true

    App\Support\Infrastructure\Sms\SmsSender:
        arguments:
            $env: '%kernel.environment%'

    App\Support\Infrastructure\Sms\GatewayAPI:
        arguments:
            $smsOptions: '%gateway_sms%'

    App\Support\Infrastructure\LogService:
        arguments:
            $env: '%kernel.environment%'
            $monoLogger: '@logger'

    App\Support\Infrastructure\Mailer\Mailer:
        arguments:
            $env: '%kernel.environment%'

    App\Survey\Infrastructure\SurveyNotifier:
        arguments:
            $fromEmail: '%env(DEFAULT_SURVEY_EMAIL)%'

    App\Support\Infrastructure\GeoLocation:
        arguments:
            $ipinfoToken: '%env(IPINFO_TOKEN)%'
            $ignoredAsns: '%env(json:GEO_IGNORED_ASNS)%'

    App\Admission\Infrastructure\EmailSender:
        arguments:
            $defaultEmail: '%env(DEFAULT_FROM_EMAIL)%'
            $economyEmail: '%env(ECONOMY_EMAIL)%'

    App\Support\Infrastructure\Slack\SlackMessenger:
        arguments:
            $endpoint: '%env(SLACK_ENDPOINT)%'
            $notificationChannel: '%slack.notification_channel%'
            $logChannel: '%slack.log_channel%'
            $disableDelivery: '%slack.disable_delivery%'
            $logger: '@logger'

    App\Support\Infrastructure\FileUploader:
        arguments:
            $signatureFolder: '%signature_images%'
            $logoFolder: '%logo_images%'
            $receiptFolder: '%receipt_images%'
            $profilePhotoFolder: '%profile_photos%'
            $articleFolder: '%article_images%'
            $sponsorFolder: '%logo_images%'

    get_set_method_normalizer:
        class: Symfony\Component\Serializer\Normalizer\GetSetMethodNormalizer
        public: false
        tags: [serializer.normalizer]

    # Event subscribers (from event_subscribers.yml)
    App\EventSubscriber\:
        resource: "../src/App/EventSubscriber"
        tags:
            - { name: kernel.event_subscriber }
        bind:
            Psr\Log\LoggerInterface: '@App\Support\Infrastructure\LogService'

    App\Support\EventSubscriber\:
        resource: "../src/App/Support/EventSubscriber"
        tags:
            - { name: kernel.event_subscriber }
        bind:
            App\Support\Infrastructure\Mailer\MailerInterface: '@App\Support\Infrastructure\Mailer\Mailer'
            App\Support\Infrastructure\Sms\SmsSenderInterface: '@App\Support\Infrastructure\Sms\SmsSender'
            Psr\Log\LoggerInterface: '@App\Support\Infrastructure\LogService'
            $env: '%kernel.environment%'

    App\Support\EventSubscriber\DbSubscriber:
        arguments:
            $env: '%kernel.environment%'
        tags:
            - { name: doctrine.event_subscriber }

    # Form extensions (from forms.yml)
    app.form.extension.help:
        class: App\Support\Form\FieldTypeHelpExtension
        tags:
            - { name: form.type_extension, extended_type: Symfony\Component\Form\Extension\Core\Type\FormType }

    # Validator constraint validators (from validators.yml)
    App\Validator\Constraints\:
        resource: "../src/App/Validator/Constraints"
        tags:
            - { name: validator.constraint_validator }

    # Twig extensions (from twig.yml)
    App\Organization\Twig\:
        resource: "../src/App/Organization/Twig"
        tags:
            - { name: twig.extension }

    App\Support\Twig\:
        resource: "../src/App/Support/Twig"
        tags:
            - { name: twig.extension }

    App\Support\Twig\AssetExtension:
        arguments:
            $rootDir: '%kernel.project_dir%'

    # Google services (from services_google.yml)
    App\Support\Infrastructure\Google\GoogleService:
        abstract: true
        arguments: ['%google_api%', '@App\Support\Infrastructure\LogService']

    App\Support\Infrastructure\Google\Gmail:
        parent: App\Support\Infrastructure\Google\GoogleService
        calls:
            - [setDefaultEmail, ['%env(DEFAULT_FROM_EMAIL)%']]

    App\Support\Infrastructure\Google\GoogleUsers:
        parent: App\Support\Infrastructure\Google\GoogleService

    App\Support\Infrastructure\Google\GoogleGroups:
        parent: App\Support\Infrastructure\Google\GoogleService

    App\Support\Infrastructure\Google\GoogleDrive:
        parent: App\Support\Infrastructure\Google\GoogleService

    App\Support\Infrastructure\Google\GoogleAPI:
        arguments: ['%google_api%', '@App\Support\Infrastructure\Google\GoogleUsers', '@App\Support\Infrastructure\Google\GoogleGroups']
