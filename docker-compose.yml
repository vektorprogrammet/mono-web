services:
  # Symfony monolith (PHP 8.4 + MySQL)
  server:
    build:
      context: ./apps/server
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://vektor:vektor@mysql:3306/vektor?serverVersion=8.0
      APP_ENV: dev

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vektor
      MYSQL_USER: vektor
      MYSQL_PASSWORD: vektor
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # TS API (Express + Postgres)
  api:
    build:
      context: ./apps/api
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://vektor:vektor@postgres:5432/vektor

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vektor
      POSTGRES_USER: vektor
      POSTGRES_PASSWORD: vektor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-ARGS", "pg_isready", "-U", "vektor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  postgres_data:
