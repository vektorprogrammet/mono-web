<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>monoweb — docs</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --border: #2a2a2e;
    --border-bright: #3d3d44;
    --text: #e8e8ea;
    --muted: #7a7a85;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --accent3: #fb923c;
    --accent4: #f472b6;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    padding: 48px 24px;
    max-width: 920px;
    margin: 0 auto;
  }

  header { margin-bottom: 56px; border-bottom: 1px solid var(--border); padding-bottom: 32px; }
  .label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
  h1 { font-size: 26px; font-weight: 500; line-height: 1.3; margin-bottom: 10px; }
  .subtitle { color: var(--muted); font-size: 14px; max-width: 600px; line-height: 1.7; }

  h2 { font-size: 15px; font-weight: 500; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  h2::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .doc-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    background: var(--surface);
    transition: border-color 0.15s, background 0.15s;
    gap: 16px;
  }
  .doc-link:hover { border-color: var(--border-bright); background: #1c1c20; }
  .doc-link-left { display: flex; align-items: center; gap: 12px; }
  .doc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .doc-title { font-weight: 500; font-size: 14px; margin-bottom: 3px; }
  .doc-desc { font-size: 12.5px; color: var(--muted); }
  .doc-tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); background: #1a1a1f; border: 1px solid var(--border); padding: 2px 8px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }

  footer { border-top: 1px solid var(--border); padding-top: 22px; color: var(--muted); font-size: 12px; font-family: 'IBM Plex Mono', monospace; margin-top: 56px; }
</style>
</head>
<body>

<header>
  <div class="label">vektorprogrammet · monoweb</div>
  <h1>Documentation</h1>
  <p class="subtitle">Internal technical docs for the monoweb codebase.</p>
</header>

<section>
  <h2>SDK</h2>
  <a href="docs/sdk-architecture.html" class="doc-link">
    <div class="doc-link-left">
      <div class="doc-dot" style="background: var(--accent2)"></div>
      <div>
        <div class="doc-title">@vektorprogrammet/sdk — Architecture</div>
        <div class="doc-desc">Domain-first SDK design, permission model, application lifecycle, and migration plan.</div>
      </div>
    </div>
    <div class="doc-tag">sdk-architecture →</div>
  </a>
</section>

<footer>monoweb · vektorprogrammet</footer>

</body>
</html>
